services:
  directory-service:
    container_name: directory-service
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "9001:8001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8001
    restart: always
    
  postgres:
    container_name: postgres
    image: postgres
    restart: always
    environment:
      POSTGRES_DB: directory_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
        
  redis:
    container_name: redis
    image: redis:alpine
    ports: 
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  seq:
    container_name: seq
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "8081:80" 
      - "5341:5341"
    restart: always

volumes:
  postgres-data:
  redis_data:
